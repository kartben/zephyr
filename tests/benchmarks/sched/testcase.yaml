tests:
  benchmark.kernel.scheduler:
    platform_key:
      - arch
    tags:
      - benchmark
      - kernel
    integration_platforms:
      - mps2/an385
      - qemu_x86
      - qemu_riscv64/qemu_virt_riscv64/smp
    slow: true
    harness: console
    harness_config:
      type: one_line
      record:
        regex:
          - "S,(?P<suite>[^,]+),(?P<benchmark>[^,]+),(?P<samples>[^,]+),(?P<total_cycles>[^,]+),(?P<mean>[^,]+),(?P<stddev>[^,]+),(?P<stderr>[^,]+),(?P<min>[^,]+),(?P<min_sample>[^,]+),(?P<max>[^,]+),(?P<max_sample>[^,]+)"
      regex:
        - "PROJECT EXECUTION SUCCESSFUL"
