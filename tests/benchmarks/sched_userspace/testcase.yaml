tests:
  benchmark.kernel.scheduler_userspace:
    arch_allow: arm64
    tags:
      - kernel
      - benchmark
      - userspace
    filter: CONFIG_ARCH_HAS_USERSPACE
    slow: true
    arch_exclude:
      - posix
    timeout: 300
    harness: console
    harness_config:
      type: one_line
      record:
        regex:
          - "S,(?P<suite>[^,]+),(?P<benchmark>[^,]+),(?P<samples>[^,]+),(?P<total_cycles>[^,]+),(?P<mean>[^,]+),(?P<stddev>[^,]+),(?P<stderr>[^,]+),(?P<min>[^,]+),(?P<min_sample>[^,]+),(?P<max>[^,]+),(?P<max_sample>[^,]+)"
      regex:
        - "PROJECT EXECUTION SUCCESSFUL"
