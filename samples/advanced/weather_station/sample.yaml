sample:
  name: Advanced Weather Station
  description: Multi-subsystem weather station with responsive LVGL UI and optional Bluetooth CTS+ESS
common:
  tags:
    - samples
    - display
    - gui
    - lvgl
    - sensors
    - rtc
  modules:
    - lvgl
tests:
  sample.advanced.weather_station:
    filter: dt_chosen_enabled("zephyr,display") and dt_alias_exists("dht0")
    harness: none
    build_only: true
    min_flash: 250
    min_ram: 32
    integration_platforms:
      - native_sim/native/64
