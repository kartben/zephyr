#
# SecureVault Node — Zephyr 4.4 Feature Showcase
# ================================================
# This demo intentionally enables one Kconfig option per new 4.4 feature so
# that every CONFIG_* below can be pointed at a specific release note entry.

# --------------------------------------------------------------------------
# [4.4 NEW] Biometrics driver subsystem
# --------------------------------------------------------------------------
CONFIG_BIOMETRICS=y
# Emulated driver is auto-selected when DT node is present (native_sim.overlay)

# --------------------------------------------------------------------------
# [4.4 NEW] Scope-based cleanup helpers (RAII in C)
# Requires compiler __cleanup__ attribute — available on GCC/Clang/LLVM.
# --------------------------------------------------------------------------
CONFIG_SCOPE_CLEANUP_HELPERS=y

# --------------------------------------------------------------------------
# [4.4 NEW] CPU Frequency Scaling — pressure-based policy
# CONFIG_CPU_FREQ_PSTATE_SET_STUB=y lets the policy run on any target even
# without real DVFS hardware, making the demo portable to native_sim.
# --------------------------------------------------------------------------
CONFIG_CPU_FREQ=y
CONFIG_CPU_FREQ_POLICY_PRESSURE=y
CONFIG_CPU_FREQ_PSTATE_SET_STUB=y
CONFIG_CPU_FREQ_INTERVAL_MS=1000
# Track threads from priority 1 (high) down to priority 10 (low)
CONFIG_CPU_FREQ_POLICY_PRESSURE_LOWEST_PRIO=10

# --------------------------------------------------------------------------
# Shell (shell_readline() — new helper in 4.4)
# --------------------------------------------------------------------------
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_STACK_SIZE=4096

# --------------------------------------------------------------------------
# [4.4 NEW] WireGuard VPN (EXPERIMENTAL — guard-disabled by default here;
# set CONFIG_WIREGUARD=y and add the zephyr-wireguard module to enable)
# --------------------------------------------------------------------------
# CONFIG_WIREGUARD=y  # uncomment when zephyr-wireguard module is present

# --------------------------------------------------------------------------
# Networking stack (needed for WireGuard path; kept minimal otherwise)
# --------------------------------------------------------------------------
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_LOG=y
CONFIG_NET_L2_DUMMY=y
CONFIG_TEST_RANDOM_GENERATOR=y

# --------------------------------------------------------------------------
# Sensor
# --------------------------------------------------------------------------
CONFIG_SENSOR=y

# --------------------------------------------------------------------------
# Logging
# --------------------------------------------------------------------------
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# --------------------------------------------------------------------------
# General
# --------------------------------------------------------------------------
CONFIG_PRINTK=y
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_HEAP_MEM_POOL_SIZE=8192
