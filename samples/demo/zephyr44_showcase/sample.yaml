sample:
  name: SecureVault Node — Zephyr 4.4 Feature Showcase
  description: >
    Demonstrates six Zephyr 4.4 new features (Biometrics API, Scope-based
    Cleanup, WireGuard VPN, CPU Frequency Pressure Policy, shell_readline,
    and ztest Benchmark Framework) through a secure facility monitoring
    application.
tests:
  sample.demo.zephyr44_showcase:
    tags: introduction
    platform_allow:
      - native_sim
    harness: console
    harness_config:
      type: one_line
      regex:
        - "Shell ready"
