CONFIG_LOG=y
CONFIG_LOG_MODE_MINIMAL=y
CONFIG_MAIN_STACK_SIZE=4096

# Ztest + Benchmark framework (Zephyr 4.4 feature)
CONFIG_ZTEST=y
CONFIG_ZTEST_BENCHMARK=y
CONFIG_ZTEST_BENCHMARK_OUTPUT_VERBOSE=y

# Zbus (benchmarked subsystem)
CONFIG_ZBUS=y
CONFIG_ZBUS_CHANNEL_NAME=y

# Scope cleanup (benchmarked feature)
CONFIG_SCOPE_CLEANUP_HELPERS=y
CONFIG_HEAP_MEM_POOL_SIZE=4096

# Random generator for benchmark infrastructure
CONFIG_TEST_RANDOM_GENERATOR=y

# Don't fail if no traditional test suites are defined
CONFIG_ZTEST_VERIFY_RUN_ALL=n
