CONFIG_LOG=y

CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_USBD_LOG_LEVEL_WRN=y
CONFIG_UDC_DRIVER_LOG_LEVEL_WRN=y
CONFIG_SAMPLE_USBD_PID=0x0007
CONFIG_SAMPLE_USBD_PRODUCT="Agent Pad"
CONFIG_HWINFO=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y

CONFIG_GPIO=y
CONFIG_INPUT=y

CONFIG_SPI=y
CONFIG_DISPLAY=y

CONFIG_LVGL=y
CONFIG_LV_Z_MEM_POOL_SIZE=16384
CONFIG_LV_COLOR_DEPTH_1=y
# The SH1106 is vertically tiled, so LVGL can only flush whole 8-row pages.
# The default 10% rendering buffer is not even one page tall, which makes
# LVGL give up and leave the panel showing its uninitialized RAM. A full
# frame is only 1 KiB here, so render the whole screen at once.
CONFIG_LV_Z_VDB_SIZE=100
CONFIG_LV_USE_LABEL=y
# The UI draws with the 1 bpp agent_pad_font_12. LVGL still needs a default
# font to exist, so pick the smallest built-in one rather than link an
# antialiased face that nothing ends up rendering.
CONFIG_LV_FONT_DEFAULT_UNSCII_8=y

CONFIG_LED_STRIP=y

CONFIG_PWM=y
CONFIG_BUZZER=y
CONFIG_REGULATOR=y

CONFIG_HEAP_MEM_POOL_SIZE=4096
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
