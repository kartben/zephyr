CONFIG_AGENT_PAD_SIM=y

# No pad hardware in QEMU
CONFIG_USB_DEVICE_STACK_NEXT=n
CONFIG_SPI=n
CONFIG_LED_STRIP=n
CONFIG_PWM=n
CONFIG_BUZZER=n
CONFIG_REGULATOR=n
CONFIG_HWINFO=n

# The virtio tablet reports a burst of events at boot
CONFIG_INPUT_QUEUE_MAX_MSGS=64

# Color framebuffer, mouse-clickable widgets. The tiling constraint that
# forces a full-frame buffer on the OLED does not apply here, and a full
# 480x272 buffer at 32 bpp would be half a megabyte.
CONFIG_LV_COLOR_DEPTH_32=y
CONFIG_LV_Z_VDB_SIZE=10
# Greyscale is available here, so use the antialiased face instead of the
# 1 bpp font the OLED needs.
CONFIG_LV_FONT_MONTSERRAT_12=y
CONFIG_LV_FONT_DEFAULT_MONTSERRAT_12=y
CONFIG_LV_USE_BUTTON=y
CONFIG_LV_Z_POINTER_FROM_CHOSEN_TOUCH=y
CONFIG_LV_Z_MEM_POOL_SIZE=131072

# Wall-clock timing for interactive use; link protocol on the second
# serial port, exposed by QEMU as a pty
CONFIG_QEMU_ICOUNT=n
CONFIG_QEMU_EXTRA_FLAGS="-serial pty"
