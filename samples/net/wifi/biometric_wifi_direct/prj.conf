# Biometrics driver + emulator for testing without hardware
CONFIG_BIOMETRICS=y
CONFIG_BIOMETRICS_EMUL=y
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_BIOMETRICS_LOG_LEVEL_INF=y

# WiFi management layer + WPA supplicant with P2P support
CONFIG_NETWORKING=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_WIFI=y
CONFIG_WIFI_NM_WPA_SUPPLICANT=y
CONFIG_WIFI_NM_WPA_SUPPLICANT_P2P=y

# RAII-style scope cleanup helpers (scope_guard / scope_defer)
CONFIG_SCOPE_CLEANUP_HELPERS=y

# Heap: WPA supplicant P2P requires ~80 KB extra
CONFIG_HEAP_MEM_POOL_SIZE=98304
CONFIG_MAIN_STACK_SIZE=4096

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
