CONFIG_MAIN_STACK_SIZE=16384
CONFIG_LV_Z_MEM_POOL_SIZE=98304
CONFIG_LV_DRAW_LAYER_SIMPLE_BUF_SIZE=32768
CONFIG_LV_DRAW_LAYER_MAX_MEMORY=98304

# To connect QEMU to a real sensor via USB-serial adapter, use the
# serial_bridge.py script (see scripts/ directory) which opens the host
# serial port at the correct baud rate and exposes a PTY for QEMU:
#
#   python3 scripts/serial_bridge.py /dev/tty.usbserial-XXXX 115200
#
# Then set the PTY path printed by the script below:
# CONFIG_QEMU_EXTRA_FLAGS="-serial /dev/ttysNNN"
#
# For testing with socat (fake responses):
#   socat -d -d pty,raw,echo=0 pty,raw,echo=0
CONFIG_QEMU_EXTRA_FLAGS="-serial /dev/ttys014"
CONFIG_QEMU_ICOUNT=n

CONFIG_LOG=y
CONFIG_BIOMETRICS_LOG_LEVEL_DBG=y

CONFIG_BIOMETRIC_STATION_ENABLE_ENROLL=n
