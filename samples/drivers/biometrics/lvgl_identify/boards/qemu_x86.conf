# Extra LVGL sizing for 1024x768 ramfb on qemu_x86 (see modules/lvgl/demos/boards/qemu_x86.conf)

CONFIG_MAIN_STACK_SIZE=16384
CONFIG_LV_Z_MEM_POOL_SIZE=98304
CONFIG_LV_DRAW_LAYER_SIMPLE_BUF_SIZE=32768
CONFIG_LV_DRAW_LAYER_MAX_MEMORY=98304


CONFIG_QEMU_EXTRA_FLAGS="-serial /dev/ttys012"
CONFIG_QEMU_ICOUNT=n


CONFIG_LOG=y
CONFIG_BIOMETRICS_LOG_LEVEL_DBG=y
