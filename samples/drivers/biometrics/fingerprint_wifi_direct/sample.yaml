sample:
  name: Fingerprint Wi-Fi Direct Demo
  description: Authenticate a user with the biometrics API and connect to a configured Wi-Fi Direct peer

tests:
  sample.drivers.biometrics.fingerprint_wifi_direct:
    harness: console
    harness_config:
      type: multi_line
      regex:
        - "User 1 authenticated"
        - "Rebuild with p2p.conf"
    tags:
      - drivers
      - biometrics
    filter: dt_alias_exists("fingerprint")
    integration_platforms:
      - native_sim/native/64
    platform_allow:
      - native_sim/native/64
