sample:
  name: Wake-up Controller (WUC) sample
  description: Enable wakeup sources and cycle through low-power sleep/wake states

tests:
  sample.drivers.wuc:
    tags:
      - drivers
      - wuc
      - pm
    depends_on: wuc
    filter: dt_node_has_prop("/zephyr,user", "wakeup-ctrls")
    harness: console
    harness_config:
      type: one_line
      regex:
        - "WUC sample started"
