CONFIG_AUDIO=y
CONFIG_AUDIO_DMIC=y

CONFIG_LOG=y
# Default is 1024; larger buffer reduces "messages dropped" under burst logging + printk.
CONFIG_LOG_BUFFER_SIZE=100000

# Deeper queue helps if the app thread lags; mem slab size in main.c must track this value.
CONFIG_AUDIO_DMIC_ESP32_RX_BLOCK_COUNT=8
# Keep dmic_esp32 at INFO so the diagnostic register-state dump and clock
# log line are visible. Re-enable LEVEL_ERR once the driver is fixed.
CONFIG_AUDIO_DMIC_LOG_LEVEL_INF=y

