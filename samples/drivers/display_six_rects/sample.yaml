sample:
  description: Draw six full-width horizontal color bands on the chosen display
  name: display_six_rects
common:
  tags: display
  extra_configs:
    - CONFIG_HEAP_MEM_POOL_SIZE=262144
tests:
  sample.drivers.display.six_rects:
    filter: dt_chosen_enabled("zephyr,display")
    harness: console
    harness_config:
      type: one_line
      regex:
        - "display_six_rects: done"
