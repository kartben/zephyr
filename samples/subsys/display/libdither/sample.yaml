sample:
  description: Image dithering library demonstration using libdither
  name: libdither sample
common:
  tags: display
tests:
  sample.display.libdither.build:
    build_only: true
    platform_allow:
      - native_sim/native/64
  sample.display.libdither.dummy:
    platform_allow:
      - native_sim/native/64
    extra_args: DTC_OVERLAY_FILE="dummy_dc.overlay"
    extra_configs:
      - CONFIG_SDL_DISPLAY=n
    harness: console
    harness_config:
      type: one_line
      regex:
        - "Display sample done"
  sample.display.libdither.ssd1306:
    platform_allow:
      - nrf52840dk/nrf52840
      - frdm_k64f/mk64f12
    extra_args: SHIELD=ssd1306_128x64
    tags:
      - shield
    harness: console
    harness_config:
      fixture: fixture_display
      type: one_line
      regex:
        - "Display sample done"
