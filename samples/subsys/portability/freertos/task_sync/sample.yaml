sample:
  name: FreeRTOS Task Synchronization
tests:
  sample.portability.freertos.task_sync:
    platform_key:
      - arch
      - simulation
    integration_platforms:
      - native_sim
    tags: freertos portability
    min_ram: 32
    min_flash: 34
    harness: console
    harness_config:
      type: multi_line
      ordered: true
      regex:
        - "Producer: giving semaphore (.*)"
        - "Consumer: got semaphore (.*)"
        - "Sample execution successful"
