sample:
  name: FreeRTOS Queue Demo
tests:
  sample.portability.freertos.queue_demo:
    platform_key:
      - arch
      - simulation
    integration_platforms:
      - native_sim
    tags: freertos portability
    min_ram: 32
    min_flash: 34
    harness: console
    harness_config:
      type: multi_line
      ordered: true
      regex:
        - "Timer: sent (.*) to queue"
        - "Receiver: got (.*) from queue"
        - "Sample execution successful"
