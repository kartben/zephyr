version = 1

# Declare default license and copyright text for files that typically do not or cannot include them.
[[annotations]]
path = [
    # zephyr-keep-sorted-start
    "**/*.cfg",
    "**/*.cmake",
    "**/*.conf",
    "**/*.ecl",
    "**/*.html",
    "**/*.json",
    "**/*.yaml",
    "**/*.yml",
    "**/*_defconfig",
    "**/CMakeLists.txt",
    "**/Kconfig*",
    "doc/requirements.in",
    "doc/requirements.txt",
    "scripts/requirements-*.in",
    "scripts/requirements-*.txt",
    # zephyr-keep-sorted-stop
]
SPDX-License-Identifier = "Apache-2.0"
SPDX-FileCopyrightText = "Copyright The Zephyr Project Contributors"

[[annotations]]
path = "**/*.rst"
SPDX-License-Identifier = "CC-BY-4.0"
SPDX-FileCopyrightText = "Copyright The Zephyr Project Contributors"

# -----------------------------------------------------------------------------
# Licensing exceptions
# -----------------------------------------------------------------------------
#
# Zephyr as a whole is Apache-2.0 licensed, but it imports or reuses a few
# components that use other licenses. Each such component is described below as
# a single REUSE annotation and is rendered on the licensing documentation page
# (see doc/LICENSING.rst) by the "zephyr.licensing" Sphinx extension.
#
# The license/copyright metadata is standard REUSE/SPDX. To *explain* a
# deviation, three optional Zephyr-specific keys may be added (the `reuse` tool
# ignores keys it does not know about):
#
#   Zephyr-Component   Human-friendly title for the component. Its presence is
#                      what promotes a plain REUSE annotation to a documented
#                      licensing exception.
#   Zephyr-Origin      Upstream project, as "name <url>" (the url is optional).
#   Zephyr-Condition   Kconfig option(s) gating whether the files end up in a
#                      build, rendered as :kconfig:option: cross references.
#
# The standard SPDX-FileComment holds the free-text rationale ("Impact").

[[annotations]]
path = [
    "scripts/dashboard/static/css/bootstrap-chop.css",
    "scripts/dashboard/static/js/bootstrap-chop.js",
]
SPDX-License-Identifier = "MIT"
SPDX-FileCopyrightText = "Copyright 2011-2025 The Bootstrap Authors"
SPDX-FileComment = "Used by the dashboard tool only and never linked into a Zephyr firmware image."
Zephyr-Component = "Bootstrap JavaScript and CSS Files"
Zephyr-Origin = "Bootstrap <https://getbootstrap.com/>"

