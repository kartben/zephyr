name: Create a Release

on:
  push:
    tags:
      - 'v*'
      - '!v*rc*'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      attestations: write # to create GitHub artifact attestations
      contents: write # to create GitHub release entry
      id-token: write # to request the OIDC token used for Sigstore signing
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Get the version
        id: get_version
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "TRIMMED_VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate SPDX JSON SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: zephyr-${{ steps.get_version.outputs.VERSION }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Create source archive
        run: |
          git archive \
            --format=tar.gz \
            --prefix=zephyr-${{ steps.get_version.outputs.VERSION }}/ \
            --output=zephyr-${{ steps.get_version.outputs.VERSION }}.tar.gz \
            "${GITHUB_SHA}"
          sha256sum zephyr-${{ steps.get_version.outputs.VERSION }}.tar.gz \
            zephyr-${{ steps.get_version.outputs.VERSION }}.spdx.json \
            > zephyr-${{ steps.get_version.outputs.VERSION }}.sha256

      - name: Generate SBOM attestation
        id: attest_sbom
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: zephyr-${{ steps.get_version.outputs.VERSION }}.tar.gz
          sbom-path: zephyr-${{ steps.get_version.outputs.VERSION }}.spdx.json

      - name: Generate REUSE SPDX report
        uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6.0.0
        with:
          args: spdx -o zephyr-${{ steps.get_version.outputs.VERSION }}.spdx

      - name: Prepare release assets
        run: |
          cp "${{ steps.attest_sbom.outputs['bundle-path'] }}" \
            zephyr-${{ steps.get_version.outputs.VERSION }}.sbom.attestation.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        continue-on-error: true
        with:
          name: zephyr-${{ steps.get_version.outputs.VERSION }}-sbom
          path: |
            zephyr-${{ steps.get_version.outputs.VERSION }}.spdx
            zephyr-${{ steps.get_version.outputs.VERSION }}.spdx.json
            zephyr-${{ steps.get_version.outputs.VERSION }}.tar.gz
            zephyr-${{ steps.get_version.outputs.VERSION }}.sha256
            zephyr-${{ steps.get_version.outputs.VERSION }}.sbom.attestation.json

      - name: Create empty release notes body
        run: |
          echo "TODO: add release overview and notes link" > release-notes.txt

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.get_version.outputs.VERSION }}" \
            "zephyr-${{ steps.get_version.outputs.VERSION }}.spdx" \
            "zephyr-${{ steps.get_version.outputs.VERSION }}.spdx.json" \
            "zephyr-${{ steps.get_version.outputs.VERSION }}.tar.gz" \
            "zephyr-${{ steps.get_version.outputs.VERSION }}.sha256" \
            "zephyr-${{ steps.get_version.outputs.VERSION }}.sbom.attestation.json" \
            --title "Zephyr ${{ steps.get_version.outputs.TRIMMED_VERSION }}" \
            --notes-file release-notes.txt \
            --draft \
            --prerelease
