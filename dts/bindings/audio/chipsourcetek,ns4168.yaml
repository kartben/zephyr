description: ChipSourceTek NS4168 mono I2S Class-D amplifier

compatible: "chipsourcetek,ns4168"

include: base.yaml

properties:
  enable-gpios:
    type: phandle-array
    description: |
      GPIO connected to the CTRL pin of the NS4168. The CTRL pin enables
      normal amplifier operation when driven high and puts the device into
      shutdown when driven low.
