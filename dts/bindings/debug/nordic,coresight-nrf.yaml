description: Nordic Coresight Subsystem (Trace Port Interface Unit)

compatible: "nordic,coresight-nrf"

include: [base.yaml, pinctrl-device.yaml, nordic-clockpin.yaml]

properties:
  reg:
    required: true

  mode:
    required: true
    type: string
    enum:
      - "unconfigured"
      - "stm-tpiu"
      - "stm-etr"
      - "etm-etb"
      - "etm-etr"
    description: >
      Specifies which mode to configure the Coresight subsystem in. The "etm-*"
      modes route Embedded Trace Macrocell (ETM) instruction trace through the
      ATB fabric to the on-chip ETB or ETR sink for capture via the ETM trace
      API (see CONFIG_ETM_TRACE).
