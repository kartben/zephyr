description: |
  DFRobot ID809 Capacitive Fingerprint Sensor (SEN0348) - I2C variant

  High-performance capacitive fingerprint scanner based on the ID809
  processor. Communicates over I2C at address 0x1F (default) using the
  same fixed-frame protocol as the UART variant. Supports 360-degree
  recognition, self-learning, duplicate detection, and an RGB LED indicator.

  Example:
    &i2c0 {
      id809: id809@1f {
        compatible = "dfrobot,id809-i2c";
        reg = <0x1f>;
        max-templates = <80>;
      };
    };

compatible: "dfrobot,id809-i2c"

include: [i2c-device.yaml]

properties:
  max-templates:
    type: int
    default: 80
    description: |
      Maximum number of fingerprint templates the module can store.
      The ID809 firmware ships with a capacity of 80 templates (default).
      Some firmware versions support up to 200 templates.
