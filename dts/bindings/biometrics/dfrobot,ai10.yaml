description: |
  DFRobot AI10 face and palm-vein recognition module (e.g. SEN0677).

  The module communicates over UART at a fixed baud rate of 115200 using a
  binary framed protocol. It stores up to 1000 face and 1000 palm-vein
  templates on-device; face templates are assigned user IDs 1-1000 and
  palm-vein templates user IDs 1001-2000.

  Datasheet: https://dfimg.dfrobot.com/wiki/21122/SEN0677_ai-binocular-face-palm-vein-qr-code-recognition-sensor_datasheet_V1.0.pdf

compatible: "dfrobot,ai10"

include: [uart-device.yaml]

examples:
  - |
    &uart1 {
      status = "okay";
      current-speed = <115200>;

      ai10: ai10 {
        compatible = "dfrobot,ai10";
        status = "okay";
      };
    };
