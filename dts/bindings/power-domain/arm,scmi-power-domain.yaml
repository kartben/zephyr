title: Arm SCMI power domain

description: |
  Power domain managed through the Arm SCMI (System Control and Management Interface)
  power domain management protocol (protocol ID: 0x11). Each instance of this node
  corresponds to an individual power domain identified by a vendor-specific domain ID.

compatible: "arm,scmi-power-domain"

include: power-domain.yaml

properties:
  reg:
    required: true
    description: SCMI power domain ID
