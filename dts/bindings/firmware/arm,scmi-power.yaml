title: Arm SCMI power domain management

description: |
  Arm SCMI (System Control and Management Interface) power domain management protocol
  node (protocol ID: 0x11). This is a child node of the SCMI transport node and provides
  power domain control capabilities through the SCMI interface. It acts as a provider of
  power domains, with each domain identified by a vendor-specific identifier.

compatible: "arm,scmi-power"

include: [base.yaml]

properties:
  reg:
    required: true
    const: [0x11]

  "#power-domain-cells":
    type: int
    required: true
    const: 1

power-domain-cells:
  - name
