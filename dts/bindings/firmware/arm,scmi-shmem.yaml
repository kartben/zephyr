title: Arm SCMI shared memory region

description: |
  Shared memory region used by the Arm SCMI (System Control and Management Interface)
  transport for message exchange between the SCMI agent and platform. This node
  describes the memory area where SCMI messages are written and read.

compatible: "arm,scmi-shmem"

include: [base.yaml]

properties:
  reg:
    required: true
