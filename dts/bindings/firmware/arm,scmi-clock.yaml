title: Arm SCMI clock management

description: |
  Arm SCMI (System Control and Management Interface) clock management protocol node
  (protocol ID: 0x14). This is a child node of the SCMI transport node and provides
  clock control and rate configuration capabilities through the SCMI interface.

compatible: "arm,scmi-clock"

include: [base.yaml, clock-controller.yaml]

properties:
  shmem:
    type: phandles

  reg:
    required: true
    const: [0x14]

  "#clock-cells":
    required: true
    const: 1
    description: |
      Vendor-specific clock identifier. Needs to match identifier
      expected by the SCMI platform as this is directly used in SCMI
      clock management messages.

clock-cells:
  - name
