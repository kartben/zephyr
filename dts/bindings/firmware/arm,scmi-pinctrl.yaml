title: Arm SCMI pin control

description: |
  Arm SCMI (System Control and Management Interface) pin control protocol node
  (protocol ID: 0x19). This is a child node of the SCMI transport node and provides
  pin multiplexing and configuration capabilities through the SCMI interface.

compatible: "arm,scmi-pinctrl"

include: base.yaml

properties:
  reg:
    required: true
    const: [0x19]

child-binding:
  description: SCMI pin protocol pin group
  properties:
    pinmux:
      required: true
      type: array
