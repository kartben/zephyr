title: Arm SCMI pin control protocol

description: Arm System Control and Management Interface (SCMI) pin control protocol

compatible: "arm,scmi-pinctrl"

include: base.yaml

properties:
  reg:
    required: true
    const: [0x19]

child-binding:
  description: SCMI pin protocol pin group
  properties:
    pinmux:
      required: true
      type: array
