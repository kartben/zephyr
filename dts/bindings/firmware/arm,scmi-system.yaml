title: Arm SCMI system power management

description: |
  Arm SCMI (System Control and Management Interface) system power management protocol
  node (protocol ID: 0x12). This is a child node of the SCMI transport node and
  provides system-level power state control capabilities, such as system reset and
  shutdown, through the SCMI interface.

compatible: "arm,scmi-system"

include: [base.yaml]

properties:
  reg:
    required: true
    const: [0x12]
