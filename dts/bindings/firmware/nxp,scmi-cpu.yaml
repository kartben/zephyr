title: NXP SCMI CPU domain management

description: |
  NXP vendor-specific SCMI (System Control and Management Interface) CPU domain
  management protocol node (protocol ID: 0x82). This is a child node of the SCMI
  transport node and provides CPU domain management capabilities specific to NXP
  platforms through the SCMI interface.

compatible: "nxp,scmi-cpu"

include: [base.yaml]

properties:
  reg:
    required: true
    const: [0x82]
